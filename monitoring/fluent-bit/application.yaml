apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluent-bit
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/your-org/infra-gitops.git
    targetRevision: HEAD
    path: monitoring/fluent-bit

  destination:
    server: https://kubernetes.default.svc
    namespace: amazon-cloudwatch

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true